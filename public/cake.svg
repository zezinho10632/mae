<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cakeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4B8"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
  </defs>
  <!-- Cake base -->
  <rect x="20" y="50" width="60" height="35" rx="5" fill="url(#cakeGrad)"/>
  <!-- Frosting -->
  <ellipse cx="50" cy="50" rx="32" ry="8" fill="#fff"/>
  <!-- Candle -->
  <rect x="47" y="30" width="6" height="20" fill="#D4AF37"/>
  <!-- Flame -->
  <ellipse cx="50" cy="26" rx="4" ry="6" fill="#FFD700"/>
  <ellipse cx="50" cy="24" rx="2" ry="4" fill="#FFA500"/>
</svg>
